<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notesify — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0a0a0a;
      --bg1:    #111111;
      --bg2:    #181818;
      --bg3:    #1f1f1f;
      --line:   rgba(255,255,255,0.07);
      --line2:  rgba(255,255,255,0.12);
      --line3:  rgba(255,255,255,0.20);
      --text:   #e8e8e8;
      --text2:  #999;
      --text3:  #555;
      --accent: #ffffff;
      --accent2:#cccccc;
      --white:  #fff;
      --red:    #ff5f57;
      --green:  #3d9970;
    }

    html { scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
    * { scrollbar-width: thin; scrollbar-color: #1f1f1f #0a0a0a; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* subtle grid + glow background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: -20%; left: 50%; transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark {
      width: 28px; height: 28px; background: var(--accent);
      border-radius: 2px; display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 24px; height: 24px; color: #000; }
    .logo-name {
      font-family: 'DM Mono', monospace;
      font-size: 15px; font-weight: 500;
      color: var(--white); letter-spacing: -0.02em;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn-nav-ghost {
      font-family: 'DM Mono', monospace;
      font-size: 12px; font-weight: 500;
      color: var(--text2); background: transparent;
      border: 1px solid var(--line2);
      padding: 7px 16px; border-radius: 2px;
      text-decoration: none; letter-spacing: 0.02em;
      transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .btn-nav-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.35); }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 1;
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .wrap {
      width: 100%; max-width: 400px;
      animation: fadeUp 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── EYEBROW ── */
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text3); text-align: center;
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .eyebrow::before, .eyebrow::after {
      content: ''; display: block; flex: 1; height: 1px;
      background: var(--line2); max-width: 60px;
    }

    .heading {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(30px, 5vw, 42px);
      font-weight: 400; line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--white); text-align: center; margin-bottom: 6px;
    }
    .heading em { font-style: italic; color: var(--text2); }

    .sub {
      font-size: 13px; color: var(--text2);
      text-align: center; font-weight: 300;
      line-height: 1.6; margin-bottom: 32px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg1);
      border: 1px solid var(--line2);
      border-radius: 6px;
      padding: 32px 28px;
    }

    .form-group {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 20px;
    }
    .form-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text3);
    }
    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    .form-input::placeholder { color: var(--text3); }
    .form-input:focus {
      border-color: rgba(255,255,255,0.3);
      background: var(--bg2);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }
    .form-input.error {
      border-color: rgba(255,95,87,0.5);
      box-shadow: 0 0 0 3px rgba(255,95,87,0.06);
    }

    /* ── ERROR MSG ── */
    .error-msg {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--red);
      letter-spacing: 0.02em;
      min-height: 16px; margin-bottom: 16px;
      opacity: 0; transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .error-msg.visible { opacity: 1; transform: translateY(0); }
    .error-msg svg { width: 12px; height: 12px; flex-shrink: 0; margin-top: 1px; }

    /* ── SUCCESS STATE ── */
    .success-box {
      display: none;
      flex-direction: column; align-items: center;
      gap: 16px; text-align: center;
      padding: 8px 0;
    }
    .success-box.visible { display: flex; }
    .success-icon {
      width: 48px; height: 48px;
      background: rgba(61,153,112,0.1);
      border: 1px solid rgba(61,153,112,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    .success-icon svg { width: 22px; height: 22px; color: var(--green); }
    .success-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px; font-weight: 400;
      color: var(--white); letter-spacing: -0.01em;
    }
    .success-msg {
      font-size: 13px; color: var(--text2);
      line-height: 1.65; font-weight: 300; max-width: 300px;
    }
    .success-email-pill {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--text);
      background: var(--bg3);
      border: 1px solid var(--line2);
      padding: 6px 14px; border-radius: 100px;
      letter-spacing: 0.02em;
    }
    .resend-row {
      font-size: 12px; color: var(--text3); font-weight: 300;
    }
    .resend-row button {
      background: none; border: none; cursor: pointer;
      color: var(--text2); font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      border-bottom: 1px solid var(--line2);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .resend-row button:hover { color: var(--text); border-color: var(--line3); }

    /* ── BUTTON ── */
    .btn-submit {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--accent); color: #000;
      font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
      padding: 13px 24px; border: none; border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      margin-bottom: 0;
    }
    .btn-submit:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-submit .spin {
      display: none; width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2); border-top-color: #000;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .btn-submit.loading .spin { display: block; }
    .btn-submit.loading .btn-label,
    .btn-submit.loading .btn-icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER LINK ── */
    .back-link {
      text-align: center; margin-top: 24px;
      font-size: 13px; color: var(--text3); font-weight: 300;
    }
    .back-link a {
      color: var(--text2); text-decoration: none;
      border-bottom: 1px solid var(--line2); padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-link a:hover { color: var(--text); border-color: var(--line3); }

    /* ── PAGE FOOTER ── */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px;
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--text3);
      letter-spacing: 0.06em; flex-shrink: 0;
    }
    .footer-logo { color: var(--accent); }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      footer { padding: 16px 20px; }
      .card { padding: 24px 18px; }
      .heading { font-size: 28px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="2" y1="9" x2="2" y2="15"/><line x1="5.5" y1="5.5" x2="5.5" y2="18.5"/><line x1="9" y1="2.5" x2="9" y2="21.5"/><line x1="12" y1="1" x2="12" y2="23"/><line x1="15" y1="4" x2="15" y2="20"/><line x1="18.5" y1="7" x2="18.5" y2="17"/><line x1="22" y1="9.5" x2="22" y2="14.5"/>
      </svg>
    </div>
    <span class="logo-name">notesify</span>
  </a>
  <div class="nav-right">
    <a href="login.html" class="btn-nav-ghost">Log In</a>
  </div>
</nav>

<main>
  <div class="wrap">

    <div class="eyebrow">Password recovery</div>
    <h1 class="heading">Forgot your<br><em>password?</em></h1>
    <p class="sub" id="sub-text">Enter your email and we'll send you a reset link.</p>

    <div class="card">

      <!-- ERROR -->
      <div class="error-msg" id="error-msg" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-text"></span>
      </div>

      <!-- FORM -->
      <div id="form-view">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input" type="email" id="email"
            placeholder="you@example.com"
            autocomplete="email" inputmode="email"
          />
        </div>

        <button class="btn-submit" id="btn-submit" type="button" disabled>
          <div class="spin"></div>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          <span class="btn-label">Send Reset Link</span>
        </button>
      </div>

      <!-- SUCCESS STATE -->
      <div class="success-box" id="success-view">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <div class="success-title">Check your inbox</div>
        <p class="success-msg">We sent a reset link to</p>
        <div class="success-email-pill" id="success-email"></div>
        <p class="success-msg" style="margin-top:-4px">Click the link in the email to set a new password.</p>
        <div class="resend-row">
          Didn't get it? <button id="btn-resend" type="button">Resend email</button>
        </div>
      </div>

    </div><!-- /card -->

    <p class="back-link">
      Remember it? <a href="login.html">Back to Log In</a>
    </p>

  </div>
</main>

<footer>
  <span class="footer-logo">Notesify</span>
  <span>© 2026 Notesify. All rights reserved.</span>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import {
    getAuth,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu4C5LIwJACYgXT8_o5ufKv8Zhrl4ZSY0",
  authDomain: "notesify-c716b.firebaseapp.com",
  databaseURL: "https://notesify-c716b-default-rtdb.firebaseio.com",
  projectId: "notesify-c716b",
  storageBucket: "notesify-c716b.firebasestorage.app",
  messagingSenderId: "379172502803",
  appId: "1:379172502803:web:a383644ee97dd363402ee6",
  measurementId: "G-7WYHHWN9W9"
};
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ── Elements ─────────────────────────────────────────────────
  const emailEl    = document.getElementById('email');
  const btnSubmit  = document.getElementById('btn-submit');
  const errorMsg   = document.getElementById('error-msg');
  const errorText  = document.getElementById('error-text');
  const formView   = document.getElementById('form-view');
  const successView= document.getElementById('success-view');
  const successEmail= document.getElementById('success-email');
  const btnResend  = document.getElementById('btn-resend');
  const subText    = document.getElementById('sub-text');

  // ── Enable button only when email typed ──────────────────────
  emailEl.addEventListener('input', () => {
    btnSubmit.disabled = emailEl.value.trim().length === 0;
    hideError();
  });

  // ── Error helpers ─────────────────────────────────────────────
  function showError(msg) {
    errorText.textContent = msg;
    errorMsg.classList.add('visible');
    emailEl.classList.add('error');
  }
  function hideError() {
    errorMsg.classList.remove('visible');
    emailEl.classList.remove('error');
  }

  // ── Send reset email ──────────────────────────────────────────
  async function sendReset(email) {
    const actionCodeSettings = {
      // Points to your Hostinger site's reset page
      url: 'https://notesify.app/reset-password.html',
      handleCodeInApp: false  // false = Firebase handles the link in the browser
    };

    await sendPasswordResetEmail(auth, email, actionCodeSettings);

    // Save email for auto-login on reset.html
    try { localStorage.setItem('notesify-reset-email', email); } catch(e) {}
  }

  // ── Submit handler ────────────────────────────────────────────
  async function handleSubmit() {
    hideError();
    const email = emailEl.value.trim();

    if (!email) { showError('Please enter your email address.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('Please enter a valid email address.'); return;
    }

    btnSubmit.classList.add('loading');
    btnSubmit.disabled = true;

    try {
      await sendReset(email);
      // Show success state
      successEmail.textContent = email;
      formView.style.display = 'none';
      successView.classList.add('visible');
      subText.textContent = 'A reset link is on its way.';
    } catch (err) {
      btnSubmit.classList.remove('loading');
      btnSubmit.disabled = false;

      const map = {
        'auth/user-not-found':        'No account found with this email address.',
        'auth/invalid-email':         'Please enter a valid email address.',
        'auth/too-many-requests':     'Too many attempts. Please wait a moment and try again.',
        'auth/network-request-failed':'Network error. Check your connection and try again.',
      };
      showError(map[err.code] || 'Something went wrong. Please try again.');
    }
  }

  // ── Resend handler ────────────────────────────────────────────
  btnResend.addEventListener('click', async () => {
    const email = successEmail.textContent;
    if (!email) return;
    btnResend.disabled = true;
    btnResend.textContent = 'Sending…';
    try {
      await sendReset(email);
      btnResend.textContent = 'Sent!';
      setTimeout(() => {
        btnResend.textContent = 'Resend email';
        btnResend.disabled = false;
      }, 4000);
    } catch(e) {
      btnResend.textContent = 'Failed — try again';
      btnResend.disabled = false;
    }
  });

  // ── Wire events ───────────────────────────────────────────────
  btnSubmit.addEventListener('click', handleSubmit);

  emailEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>

</body>
</html>
