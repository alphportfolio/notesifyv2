<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notesify — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0a0a0a;
      --bg1: #111111;
      --bg2: #181818;
      --bg3: #1f1f1f;
      --line: rgba(255, 255, 255, 0.07);
      --line2: rgba(255, 255, 255, 0.12);
      --line3: rgba(255, 255, 255, 0.20);
      --text: #e8e8e8;
      --text2: #999;
      --text3: #555;
      --accent: #ffffff;
      --accent2: #cccccc;
      --white: #fff;
      --red: #ff5f57;
      --green: #28c840;
    }

    html {
      scroll-behavior: smooth
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg3);
      border-radius: 0
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #333
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: #1f1f1f #0a0a0a
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(255, 255, 255, 0.04) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0
    }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 56px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .logo-mark svg {
      width: 24px;
      height: 24px;
      color: #000
    }

    .logo-name {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      letter-spacing: -0.02em
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .btn-nav-ghost {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      background: transparent;
      border: 1px solid var(--line2);
      padding: 7px 16px;
      border-radius: 2px;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color .15s, border-color .15s
    }

    .btn-nav-ghost:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, .35)
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      background: var(--accent);
      color: #000;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 2px;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: background .2s, transform .2s cubic-bezier(.22, .61, .36, 1), box-shadow .2s
    }

    .btn-nav:hover {
      background: var(--accent2);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, .15)
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px
    }

    .register-wrap {
      width: 100%;
      max-width: 400px;
      animation: fadeUp .4s cubic-bezier(.22, .61, .36, 1) both
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .register-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      text-align: center;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px
    }

    .register-eyebrow::before,
    .register-eyebrow::after {
      content: '';
      display: block;
      flex: 1;
      height: 1px;
      background: var(--line2);
      max-width: 60px
    }

    .register-heading {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(30px, 5vw, 42px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--white);
      text-align: center;
      margin-bottom: 6px
    }

    .register-heading em {
      font-style: italic;
      color: var(--text2)
    }

    .register-sub {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 32px
    }

    .register-card {
      background: var(--bg1);
      border: 1px solid var(--line2);
      border-radius: 6px;
      padding: 32px 28px
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px
    }

    .form-group:last-of-type {
      margin-bottom: 0
    }

    .form-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3)
    }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s, background .15s, box-shadow .15s;
      -webkit-appearance: none
    }

    .form-input::placeholder {
      color: var(--text3)
    }

    .form-input:focus {
      border-color: rgba(255, 255, 255, 0.3);
      background: var(--bg2);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, .04)
    }

    .form-input.error {
      border-color: rgba(255, 95, 87, .5);
      box-shadow: 0 0 0 3px rgba(255, 95, 87, .06)
    }

    .pw-wrap {
      position: relative
    }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      display: flex;
      align-items: center;
      padding: 4px;
      transition: color .15s
    }

    .pw-toggle:hover {
      color: var(--text2)
    }

    .pw-toggle svg {
      width: 15px;
      height: 15px
    }

    .pw-wrap .form-input {
      padding-right: 40px
    }

    .strength-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity .2s
    }

    .strength-wrap.visible {
      opacity: 1
    }

    .strength-bars {
      display: flex;
      gap: 4px;
      flex: 1
    }

    .strength-bar {
      flex: 1;
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
      transition: background .25s
    }

    .strength-bar.weak {
      background: var(--red)
    }

    .strength-bar.fair {
      background: #febc2e
    }

    .strength-bar.strong {
      background: var(--green)
    }

    .strength-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      min-width: 44px;
      transition: color .2s
    }

    .strength-label.weak {
      color: var(--red)
    }

    .strength-label.fair {
      color: #febc2e
    }

    .strength-label.strong {
      color: var(--green)
    }

    .match-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity .2s, transform .2s
    }

    .match-indicator.visible {
      opacity: 1;
      transform: translateY(0)
    }

    .match-indicator svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0
    }

    .match-indicator.ok {
      color: var(--green)
    }

    .match-indicator.bad {
      color: var(--red)
    }

    .error-msg {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--red);
      letter-spacing: 0.02em;
      min-height: 16px;
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity .2s, transform .2s;
      line-height: 1.5
    }

    .error-msg.visible {
      opacity: 1;
      transform: translateY(0)
    }

    .error-msg a {
      color: var(--red);
      text-decoration: underline
    }

    .btn-register {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--accent);
      color: #000;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 13px 24px;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background .15s, transform .1s, opacity .15s;
      margin-top: 22px;
      margin-bottom: 20px
    }

    .btn-register:hover {
      background: var(--accent2);
      transform: translateY(-1px)
    }

    .btn-register:active {
      transform: translateY(0)
    }

    .btn-register:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none
    }

    .btn-register svg {
      width: 14px;
      height: 14px
    }

    .btn-register .spin {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 0, 0, .2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite
    }

    .btn-register.loading .spin {
      display: block
    }

    .btn-register.loading .btn-label,
    .btn-register.loading .btn-icon {
      display: none
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line)
    }

    .divider span {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      white-space: nowrap
    }

    .sso-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: transparent;
      border: 1px solid var(--line2);
      border-radius: 2px;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 11px 20px;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s
    }

    .sso-btn:hover {
      border-color: var(--line3);
      color: var(--text);
      background: rgba(255, 255, 255, .02)
    }

    .sso-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0
    }

    .login-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text3);
      font-weight: 300
    }

    .login-link a {
      color: var(--text2);
      text-decoration: none;
      border-bottom: 1px solid var(--line2);
      padding-bottom: 1px;
      transition: color .15s, border-color .15s
    }

    .login-link a:hover {
      color: var(--text);
      border-color: var(--line3)
    }

    .terms-note {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      line-height: 1.6;
      margin-top: 16px;
      font-weight: 300
    }

    .terms-note a {
      color: var(--text3);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      padding-bottom: 1px;
      transition: color .15s
    }

    .terms-note a:hover {
      color: var(--text2)
    }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.06em;
      flex-shrink: 0
    }

    .footer-logo {
      color: var(--accent)
    }

    @media(max-width:600px) {
      nav {
        padding: 0 20px
      }

      footer {
        padding: 16px 20px
      }

      .register-card {
        padding: 24px 18px
      }

      .register-heading {
        font-size: 28px
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="2" y1="9" x2="2" y2="15" />
          <line x1="5.5" y1="5.5" x2="5.5" y2="18.5" />
          <line x1="9" y1="2.5" x2="9" y2="21.5" />
          <line x1="12" y1="1" x2="12" y2="23" />
          <line x1="15" y1="4" x2="15" y2="20" />
          <line x1="18.5" y1="7" x2="18.5" y2="17" />
          <line x1="22" y1="9.5" x2="22" y2="14.5" />
        </svg>
      </div>
      <span class="logo-name">notesify</span>
    </a>
    <div class="nav-right">
      <a href="login.html" class="btn-nav-ghost">Log In</a>
      <a href="app.html" class="btn-nav">Start Writing →</a>
    </div>
  </nav>

  <main>
    <div class="register-wrap">
      <div class="register-eyebrow">Get started</div>
      <h1 class="register-heading">Create your<br><em>account</em></h1>
      <p class="register-sub">Free forever. No credit card required.</p>

      <div class="register-card" id="register-card">
        <div class="error-msg" id="error-msg" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com"
            autocomplete="email" inputmode="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="pw-wrap">
            <input class="form-input" type="password" id="password" name="password" placeholder="••••••••"
              autocomplete="new-password" />
            <button class="pw-toggle" type="button" id="pw-toggle-1" aria-label="Toggle password visibility"
              tabindex="-1">
              <svg id="eye-icon-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div class="strength-wrap" id="strength-wrap">
            <div class="strength-bars">
              <div class="strength-bar" id="sb1"></div>
              <div class="strength-bar" id="sb2"></div>
              <div class="strength-bar" id="sb3"></div>
              <div class="strength-bar" id="sb4"></div>
            </div>
            <span class="strength-label" id="strength-label">Weak</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm password</label>
          <div class="pw-wrap">
            <input class="form-input" type="password" id="confirm-password" name="confirm-password"
              placeholder="••••••••" autocomplete="new-password" />
            <button class="pw-toggle" type="button" id="pw-toggle-2" aria-label="Toggle confirm password visibility"
              tabindex="-1">
              <svg id="eye-icon-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div class="match-indicator" id="match-indicator">
            <svg id="match-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"></svg>
            <span id="match-text"></span>
          </div>
        </div>

        <button class="btn-register" id="btn-register" type="button" disabled>
          <div class="spin"></div>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          <span class="btn-label">Create Account</span>
        </button>

        <div class="divider"><span>or sign up with</span></div>

        <button class="sso-btn" type="button" id="btn-sso">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          Continue with Google
        </button>
      </div>

      <p class="login-link">Already have an account? <a href="login.html">Sign in</a></p>
      <p class="terms-note">
        By creating an account you agree to our
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>
    </div>
  </main>

  <footer>
    <span class="footer-logo">Notesify</span>
    <span>© 2026 Notesify. All rights reserved.</span>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import {
      getAuth,
      setPersistence,
      inMemoryPersistence,
      browserLocalPersistence,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      sendEmailVerification,
      deleteUser,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAu4C5LIwJACYgXT8_o5ufKv8Zhrl4ZSY0",
      authDomain: "notesify-c716b.firebaseapp.com",
      databaseURL: "https://notesify-c716b-default-rtdb.firebaseio.com",
      projectId: "notesify-c716b",
      storageBucket: "notesify-c716b.firebasestorage.app",
      messagingSenderId: "379172502803",
      appId: "1:379172502803:web:a383644ee97dd363402ee6",
      measurementId: "G-7WYHHWN9W9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ── FIX 1: IndexedDB crash (private/incognito/strict browsers) ────────────
    // Try the default localStorage persistence. If IndexedDB is blocked,
    // fall back silently to in-memory so Firebase doesn't crash on every call.
    async function initPersistence() {
      try {
        await setPersistence(auth, browserLocalPersistence);
      } catch (_) {
        try {
          await setPersistence(auth, inMemoryPersistence);
        } catch (__) {
          // If even in-memory fails, proceed anyway — auth calls may still work
        }
      }
    }

    await initPersistence();

    // Redirect only if user is genuinely verified
    signOut(auth).catch(() => { }).finally(() => {
      onAuthStateChanged(auth, (user) => {
        if (user && user.emailVerified) window.location.href = 'app.html';
      });
    });

    // ── Eye toggles ───────────────────────────────────────────────────────────
    const eyeOpen = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    const eyeOff = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

    function initPwToggle(inputId, btnId, iconId) {
      const input = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      const icon = document.getElementById(iconId);
      btn.addEventListener('click', () => {
        const hidden = input.type === 'password';
        input.type = hidden ? 'text' : 'password';
        icon.innerHTML = hidden ? eyeOff : eyeOpen;
      });
    }
    initPwToggle('password', 'pw-toggle-1', 'eye-icon-1');
    initPwToggle('confirm-password', 'pw-toggle-2', 'eye-icon-2');

    // ── Strength ──────────────────────────────────────────────────────────────
    function getStrength(pw) {
      if (!pw) return 0;
      let s = 0;
      if (pw.length >= 8) s++;
      if (pw.length >= 12) s++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
      if (/[0-9]/.test(pw)) s++;
      if (/[^A-Za-z0-9]/.test(pw)) s++;
      return Math.min(4, s);
    }

    function updateStrength(pw) {
      const wrap = document.getElementById('strength-wrap');
      const label = document.getElementById('strength-label');
      const bars = ['sb1', 'sb2', 'sb3', 'sb4'].map(id => document.getElementById(id));
      if (!pw) { wrap.classList.remove('visible'); return; }
      wrap.classList.add('visible');
      const score = getStrength(pw);
      const cls = score <= 1 ? 'weak' : score <= 2 ? 'fair' : 'strong';
      const lbl = score <= 1 ? 'Weak' : score <= 2 ? 'Fair' : score <= 3 ? 'Good' : 'Strong';
      bars.forEach((b, i) => { b.className = 'strength-bar'; if (i < score) b.classList.add(cls); });
      label.className = 'strength-label ' + cls;
      label.textContent = lbl;
    }

    // ── Match ─────────────────────────────────────────────────────────────────
    function updateMatch() {
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirm-password').value;
      const ind = document.getElementById('match-indicator');
      const ico = document.getElementById('match-icon');
      const txt = document.getElementById('match-text');
      if (!cpw) { ind.classList.remove('visible', 'ok', 'bad'); return; }
      ind.classList.add('visible');
      if (pw === cpw) {
        ind.classList.remove('bad'); ind.classList.add('ok');
        ico.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
        txt.textContent = 'Passwords match';
      } else {
        ind.classList.remove('ok'); ind.classList.add('bad');
        ico.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
        txt.textContent = 'Passwords do not match';
      }
      checkEnableButton();
    }

    function checkEnableButton() {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirm-password').value;
      document.getElementById('btn-register').disabled =
        !(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) && pw.length >= 6 && pw === cpw);
    }

    // ── Error helpers ─────────────────────────────────────────────────────────
    function showError(msg, fieldId) {
      const el = document.getElementById('error-msg');
      el.innerHTML = msg;  // use innerHTML so we can include links
      el.classList.add('visible');
      if (fieldId) document.getElementById(fieldId).classList.add('error');
    }

    function clearError() {
      document.getElementById('error-msg').classList.remove('visible');
      ['email', 'password', 'confirm-password'].forEach(id =>
        document.getElementById(id).classList.remove('error')
      );
    }

    // ── Input listeners ───────────────────────────────────────────────────────
    document.getElementById('email').addEventListener('input', () => { clearError(); checkEnableButton(); });
    document.getElementById('password').addEventListener('input', function () { clearError(); updateStrength(this.value); updateMatch(); checkEnableButton(); });
    document.getElementById('confirm-password').addEventListener('input', () => { clearError(); updateMatch(); });

    // ── Success screen ────────────────────────────────────────────────────────
    function showSuccess(email) {
      document.getElementById('register-card').innerHTML = `
        <div style="text-align:center;padding:12px 0 4px;">
          <div style="font-size:36px;margin-bottom:20px;">✉️</div>
          <p style="font-family:'DM Mono',monospace;font-size:13px;color:var(--text);
             margin-bottom:12px;font-weight:500;letter-spacing:.02em;">
            Check your email to verify your account
          </p>
          <p style="font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:28px;font-weight:300;">
            We sent a link to <strong style="color:var(--text);font-weight:500;">${email}</strong>.<br>
            Click it, then come back here to log in.
          </p>
          <a href="login.html" style="display:inline-block;background:var(--accent);color:#000;
             font-family:'DM Mono',monospace;font-size:12px;font-weight:500;
             padding:12px 28px;border-radius:2px;text-decoration:none;letter-spacing:.04em;">
            Go to Login →
          </a>
        </div>
      `;
    }

    // ── Core create ───────────────────────────────────────────────────────────
    async function doCreate(email, pw) {
      const result = await createUserWithEmailAndPassword(auth, email, pw);
      // Build the continue URL from the current origin so this works on any
      // authorized domain (localhost, staging, production) without hardcoding.
      const continueUrl = window.location.origin + '/verify.html';
      await sendEmailVerification(result.user, {
        url: continueUrl,
        handleCodeInApp: false
      });
      await signOut(auth);
      showSuccess(email);
    }

    // ── Main handler ──────────────────────────────────────────────────────────
    async function handleRegister() {
      clearError();
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirm-password').value;
      const btn = document.getElementById('btn-register');

      if (!email) { showError('Please enter your email address.', 'email'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email address.', 'email'); return; }
      if (!pw) { showError('Please choose a password.', 'password'); return; }
      if (pw.length < 6) { showError('Password must be at least 6 characters.', 'password'); return; }
      if (pw !== cpw) { showError('Passwords do not match.', 'confirm-password'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        await doCreate(email, pw);

      } catch (err) {
        console.error('Registration error:', err.code, err.message);

        // ── email-already-in-use: attempt recovery ────────────────────────────
        // This can happen when a previous attempt half-created an unverified account.
        // We try to sign in with the same password — if the account is unverified,
        // delete it and re-create. If verified, it's a real account. If wrong
        // password, we can't recover — direct to login.
        if (err.code === 'auth/email-already-in-use') {
          try {
            const cred = await signInWithEmailAndPassword(auth, email, pw);

            if (!cred.user.emailVerified) {
              // Orphaned unverified account — delete and re-register silently.
              // Wait briefly for Firebase's server-side deletion to propagate
              // before retrying, otherwise we may get email-already-in-use again.
              await deleteUser(cred.user);
              await new Promise(r => setTimeout(r, 1500));
              try {
                await doCreate(email, pw);
              } catch (retryErr) {
                btn.classList.remove('loading');
                btn.disabled = false;
                if (retryErr.code === 'auth/email-already-in-use') {
                  showError('Account setup is still finalising. Please wait a few seconds and try again.');
                } else {
                  showError(`Something went wrong (${retryErr.code ?? 'unknown'}). Please try again.`);
                }
              }
            } else {
              // Real verified account
              await signOut(auth);
              btn.classList.remove('loading');
              btn.disabled = false;
              showError('An account with this email already exists. <a href="login.html">Sign in instead →</a>', 'email');
            }

          } catch (signInErr) {
            btn.classList.remove('loading');
            btn.disabled = false;

            // Wrong password = someone else owns this email (or user forgot their password).
            // Also catch auth/invalid-login-credentials which newer Firebase SDK versions return.
            const ownedByOther = [
              'auth/wrong-password',
              'auth/invalid-credential',
              'auth/invalid-login-credentials',
              'auth/user-not-found'
            ].includes(signInErr.code);
            if (ownedByOther) {
              showError('An account with this email already exists. <a href="login.html">Sign in or reset your password →</a>', 'email');
            } else {
              // Sign-in itself failed for another reason (network, etc.)
              showError(`Something went wrong (${signInErr.code ?? 'unknown'}). Please check your connection and try again.`);
            }
          }
          return;
        }

        // ── All other errors ──────────────────────────────────────────────────
        btn.classList.remove('loading');
        btn.disabled = false;

        const msgs = {
          'auth/invalid-email': 'Please enter a valid email address.',
          'auth/weak-password': 'Password is too weak. Use at least 6 characters.',
          'auth/network-request-failed': 'Network error. Check your connection and try again.',
          'auth/too-many-requests': 'Too many attempts. Please wait a moment and try again.',
          'auth/operation-not-allowed': 'Email sign-up is not enabled. Contact support.',
          'auth/unauthorized-continue-uri': 'Domain not authorized in Firebase. Add this domain to the Authorized Domains list in your Firebase console.'
        };
        showError(msgs[err.code] || `Something went wrong (${err.code}). Please try again.`);
      }
    }

    document.getElementById('btn-register').addEventListener('click', handleRegister);
    document.getElementById('btn-sso').addEventListener('click', () => {
      showError('Google Sign-Up is not connected yet.');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const a = document.activeElement;
        if (a && ['email', 'password', 'confirm-password'].includes(a.id)) handleRegister();
      }
    });
  </script>
